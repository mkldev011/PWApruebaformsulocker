<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Académica</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Estilo moderno y claro */
    body { background: #f0f2f5; color: #444; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px 20px; margin: 0; overflow: hidden; }
    .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { color: #ff90bf; margin-bottom: 20px; font-size: 22px; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #eee; background: #fafafa; color: #333; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
    input:focus { border-color: #ff90bf; }
    button { background: #ff90bf; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
    button:hover { background: #e07bad; transform: translateY(-2px); }
    #st { margin-top: 15px; color: #2ecc71; font-weight: bold; display: none; }
    
    /* El iframe que cubrirá la pantalla si Google deja */
    #viewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; background: white; z-index: 9999; }
  </style>
</head>
<body>

  <div class="container" id="main-ui">
    <h2>Centro de Apoyo</h2>
    <input type="text" id="url" placeholder="Pega el link del formulario">
    <button id="btn">Lanzar con Bypass</button>
    <div id="st">¡Bypass Activo!</div>
  </div>

  <!-- El visor oculto -->
  <iframe id="viewer"></iframe>

  <script>
    // BYPASS DE VISIBILIDAD (El escudo contra Blocksi)
    const fixVis = () => {
      Object.defineProperty(document, 'visibilityState', {value: 'visible', writable: false});
      Object.defineProperty(document, 'hidden', {value: false, writable: false});
      Object.defineProperty(document, 'webkitVisibilityState', {value: 'visible', writable: false});
    };
    fixVis();

    document.getElementById('btn').onclick = function() {
      let url = document.getElementById('url').value.trim();
      if (!url) return alert("Pega un link primero");
      if (!url.startsWith("http")) url = "https://" + url;

      const viewer = document.getElementById('viewer');
      const ui = document.getElementById('main-ui');
      const st = document.getElementById('st');

      // 1. Intentamos cargar el formulario dentro de la App
      viewer.src = url;
      viewer.style.display = "block";
      ui.style.display = "none"; // Escondemos el menú
      st.style.display = "block";

      // 2. Por si Google bloquea el iframe, intentamos abrirlo también en pestaña
      // Así tus amigos tienen doble oportunidad
      setTimeout(() => {
          window.open(url, '_blank');
      }, 500);
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
