<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Académica</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { background: #1a1a1a; color: #ff90bf; font-family: sans-serif; text-align: center; padding: 20px; }
    input { width: 90%; padding: 12px; border-radius: 8px; border: 2px solid #ff90bf; background: #2a2a2a; color: white; margin-bottom: 20px; }
    button { background: #ff90bf; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .status { margin-top: 15px; color: #00ff00; font-size: 14px; display: none; }
  </style>
</head>
<body>
  <h2>Calculadora de Estudio</h2>
  <input type="text" id="url" placeholder="Pega el link aquí (forms.gle o docs.google.com)">
  <br>
  <button id="btn">Lanzar con Bypass</button>
  <div id="st" class="status">¡Bypass Activado! No cierres esta ventana.</div>

  <script>
    // Bypass de visibilidad: Engaña al Chromebook
    Object.defineProperty(document, 'visibilityState', {value: 'visible', writable: false});
    Object.defineProperty(document, 'hidden', {value: false, writable: false});

    document.getElementById('btn').onclick = function() {
      let url = document.getElementById('url').value.trim();
      
      // Si el link no tiene http, se lo ponemos nosotros
      if (!url.startsWith("http")) { url = "https://" + url; }

      // ABRIR SIN FILTROS: Esto elimina el error de "URL no válida"
      window.open(url, '_blank');
      
      document.getElementById('st').style.display = "block";
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
